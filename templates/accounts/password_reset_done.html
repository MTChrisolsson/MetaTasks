{% extends 'base_public.html' %}

{% block title %}Check Your Email - MetaTask{% endblock %}
{% block main_classes %}pt-28 pb-20{% endblock %}

{% block content %}
<section class="px-6 py-10 lg:px-8">
    <div class="mx-auto max-w-md">
        <div class="public-card px-6 py-10 text-center sm:px-8">
            <h1 class="text-3xl font-black text-on-surface">Check your email</h1>
            <p class="mt-4 text-sm text-on-surface-variant">
                If an account exists for that email address, a password reset link has been sent.
            </p>
            <div class="mt-6">
                <a href="{% url 'accounts:login' %}" class="public-link font-semibold">
                    Return to sign in
                </a>
            </div>
        </div>
    </div>
</section>
{% endblock %}
