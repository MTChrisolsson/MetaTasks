{% extends 'analytics/analytics_base.html' %}

{% block title %}Profile Required{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto py-12 px-4">
    <div class="bg-white rounded-lg border border-gray-200 p-8 text-center">
        <div class="mx-auto mb-6">
            <i class="fas fa-user-circle text-6xl text-gray-400"></i>
        </div>
        <h2 class="text-2xl font-bold text-gray-900 mb-4">Profile Required</h2>
        <p class="text-gray-600 mb-6">
            You need a valid organization profile to access Analytics.
        </p>
        <a href="{% url 'dashboard:dashboard' %}" class="inline-flex items-center px-4 py-2 rounded-lg border border-gray-300 text-gray-700 hover:bg-gray-50">
            <i class="fas fa-arrow-left mr-2"></i>Back to Dashboard
        </a>
    </div>
</div>
{% endblock %}
