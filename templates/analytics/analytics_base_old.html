<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Analytics - Vehicle Statistics{% endblock %}</title>
    
    <!-- TailwindCSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Chart.js for analytics -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <!-- Alpine.js for interactive components -->
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    
    {% block extra_head %}{% endblock %}
    
    <style>
        /* Custom Analytics theme colors */
        :root {
            --analytics-primary: #6366f1;
            --analytics-secondary: #8b5cf6;
            --analytics-success: #10b981;
            --analytics-warning: #f59e0b;
            --analytics-danger: #ef4444;
        }
        
        .analytics-gradient {
            background: linear-gradient(135deg, var(--analytics-primary) 0%, var(--analytics-secondary) 100%);
        }
        
        .sidebar-transition {
            transition: transform 0.3s ease-in-out;
        }
    </style>
</head>

<body class="bg-gray-50 font-sans" x-data="{ sidebarOpen: false }">
    <!-- Top Header Bar -->
    <header class="analytics-gradient shadow-lg sticky top-0 z-40 lg:z-30">
        <div class="flex justify-between items-center h-16 px-4">
            <!-- Logo -->
            <div class="flex items-center">
                <div class="w-10 h-10 bg-white bg-opacity-20 rounded-lg flex items-center justify-center">
                    <i class="fas fa-chart-bar text-white text-lg"></i>
                </div>
                <div class="ml-3">
                    <a href="{% url 'analytics:upload' %}" class="text-white font-bold text-xl">
                        Analytics
                    </a>
                    <div class="text-indigo-100 text-xs">
                        {% if profile %}{{ profile.organization.name }}{% endif %}
                    </div>
                </div>
            </div>
            
            <!-- Top Right Actions -->
            <div class="flex items-center space-x-2">
                <!-- Back to Dashboard -->
                <a href="{% url 'dashboard:dashboard' %}" 
                   class="text-indigo-100 hover:bg-white hover:bg-opacity-10 px-3 py-2 rounded-lg text-sm font-medium transition-all duration-200 flex items-center"
                   title="Dashboard">
                    <i class="fas fa-home mr-2"></i>
                    <span class="hidden sm:inline">Dashboard</span>
                </a>
                
                <!-- User Profile -->
                <div class="border-l border-indigo-300 pl-2 ml-2">
                    <span class="text-indigo-100 text-sm">{{ user.get_full_name }}</span>
                </div>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="flex-1">
        {% block content %}{% endblock %}
    </main>

    <!-- Footer -->
    <footer class="bg-white border-t border-gray-200 mt-12">
        <div class="max-w-7xl mx-auto px-4 py-6 sm:px-6 lg:px-8">
            <p class="text-gray-600 text-sm text-center">
                &copy; 2025 MetaTask Analytics. All rights reserved.
            </p>
        </div>
    </footer>
</body>
</html>
