{% if messages %}
<section class="px-6 pt-6 lg:px-8">
    <div class="mx-auto flex max-w-5xl flex-col gap-3">
        {% for message in messages %}
            <div class="rounded-2xl border px-4 py-3 text-sm font-medium {% if message.tags == 'error' %}border-error/20 bg-error-container text-on-error-container{% elif message.tags == 'success' %}border-secondary/20 bg-secondary-container/60 text-on-secondary-fixed-variant{% else %}border-primary/20 bg-primary-fixed/60 text-on-primary-fixed-variant{% endif %}">
                {{ message }}
            </div>
        {% endfor %}
    </div>
</section>
{% endif %}
