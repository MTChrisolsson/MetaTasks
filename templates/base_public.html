{% load static %}
<!DOCTYPE html>
<html class="scroll-smooth" lang="en">
<head>
    <meta charset="utf-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>{% block title %}{{ title|default:'MetaTask' }}{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,typography,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "on-error": "#ffffff",
                        "outline": "#737686",
                        "on-primary-fixed-variant": "#003ea8",
                        "inverse-primary": "#b4c5ff",
                        "on-tertiary": "#ffffff",
                        "surface-container-low": "#f0f3ff",
                        "primary-fixed": "#dbe1ff",
                        "secondary-fixed": "#85f8c4",
                        "on-secondary": "#ffffff",
                        "surface-container-highest": "#dce2f3",
                        "surface-container": "#e7eefe",
                        "tertiary-fixed-dim": "#4edea3",
                        "surface-container-lowest": "#ffffff",
                        "secondary-fixed-dim": "#68dba9",
                        "outline-variant": "#c3c6d7",
                        "secondary": "#006c4a",
                        "on-tertiary-fixed": "#002113",
                        "background": "#f9f9ff",
                        "on-primary-fixed": "#00174b",
                        "tertiary-container": "#007d55",
                        "on-tertiary-fixed-variant": "#005236",
                        "tertiary": "#006242",
                        "on-surface": "#151c27",
                        "primary": "#004ac6",
                        "on-secondary-container": "#00714e",
                        "inverse-on-surface": "#ebf1ff",
                        "on-secondary-fixed-variant": "#005137",
                        "on-secondary-fixed": "#002114",
                        "on-background": "#151c27",
                        "on-error-container": "#93000a",
                        "error-container": "#ffdad6",
                        "surface-dim": "#d3daea",
                        "primary-fixed-dim": "#b4c5ff",
                        "on-primary": "#ffffff",
                        "surface-tint": "#0053db",
                        "inverse-surface": "#2a313d",
                        "on-surface-variant": "#434655",
                        "surface-variant": "#dce2f3",
                        "surface-bright": "#f9f9ff",
                        "tertiary-fixed": "#6ffbbe",
                        "secondary-container": "#82f5c1",
                        "primary-container": "#2563eb",
                        "on-primary-container": "#eeefff",
                        "on-tertiary-container": "#bdffdb",
                        "error": "#ba1a1a",
                        "surface": "#f9f9ff",
                        "surface-container-high": "#e2e8f8"
                    },
                    fontFamily: {
                        headline: ["Inter", "sans-serif"],
                        body: ["Inter", "sans-serif"],
                        label: ["Inter", "sans-serif"]
                    },
                    boxShadow: {
                        soft: "0 24px 60px rgba(21, 28, 39, 0.12)",
                        float: "0 20px 50px rgba(0, 74, 198, 0.18)"
                    },
                    borderRadius: {
                        xl: "0.75rem",
                        "2xl": "1.25rem",
                        "3xl": "1.75rem"
                    }
                }
            }
        }
    </script>
    <style>
        :root {
            color-scheme: light;
        }

        body {
            font-family: 'Inter', sans-serif;
            background:
                radial-gradient(circle at top left, rgba(37, 99, 235, 0.12), transparent 30%),
                radial-gradient(circle at top right, rgba(0, 108, 74, 0.1), transparent 26%),
                #f9f9ff;
        }

        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }

        .glass-nav {
            backdrop-filter: blur(18px);
        }

        .premium-gradient {
            background: linear-gradient(135deg, #004ac6 0%, #2563eb 100%);
        }

        .public-card {
            background: rgba(255, 255, 255, 0.82);
            border: 1px solid rgba(195, 198, 215, 0.45);
            border-radius: 1.5rem;
            box-shadow: 0 24px 60px rgba(21, 28, 39, 0.08);
        }

        .public-card-muted {
            background: rgba(240, 243, 255, 0.82);
            border: 1px solid rgba(195, 198, 215, 0.5);
            border-radius: 1.5rem;
        }

        .public-input,
        .public-select,
        .public-textarea {
            width: 100%;
            border: 1px solid #c3c6d7;
            border-radius: 1rem;
            background: rgba(255, 255, 255, 0.92);
            color: #151c27;
            padding: 0.95rem 1rem;
            transition: border-color 0.2s ease, box-shadow 0.2s ease, transform 0.2s ease;
        }

        .public-input:focus,
        .public-select:focus,
        .public-textarea:focus {
            outline: none;
            border-color: #0053db;
            box-shadow: 0 0 0 4px rgba(0, 83, 219, 0.12);
        }

        .public-textarea {
            min-height: 7rem;
            resize: vertical;
        }

        .public-form input:not([type='checkbox']):not([type='hidden']):not([type='radio']),
        .public-form select,
        .public-form textarea {
            width: 100%;
            border: 1px solid #c3c6d7;
            border-radius: 1rem;
            background: rgba(255, 255, 255, 0.92);
            color: #151c27;
            padding: 0.95rem 1rem;
            transition: border-color 0.2s ease, box-shadow 0.2s ease, transform 0.2s ease;
        }

        .public-form input:not([type='checkbox']):not([type='hidden']):not([type='radio']):focus,
        .public-form select:focus,
        .public-form textarea:focus {
            outline: none;
            border-color: #0053db;
            box-shadow: 0 0 0 4px rgba(0, 83, 219, 0.12);
        }

        .public-form ul.errorlist {
            margin-top: 0.5rem;
            color: #93000a;
            font-size: 0.875rem;
        }

        .public-checkbox {
            accent-color: #0053db;
            width: 1rem;
            height: 1rem;
            margin-top: 0.2rem;
        }

        .public-button-primary {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            border-radius: 1rem;
            padding: 0.95rem 1.5rem;
            background: linear-gradient(135deg, #004ac6 0%, #2563eb 100%);
            color: #ffffff;
            font-weight: 700;
            transition: transform 0.2s ease, box-shadow 0.2s ease, opacity 0.2s ease;
            box-shadow: 0 18px 40px rgba(0, 74, 198, 0.2);
        }

        .public-button-primary:hover {
            transform: translateY(-1px);
        }

        .public-button-secondary {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            border-radius: 1rem;
            padding: 0.95rem 1.5rem;
            border: 1px solid rgba(195, 198, 215, 0.8);
            background: rgba(255, 255, 255, 0.85);
            color: #151c27;
            font-weight: 700;
            transition: transform 0.2s ease, border-color 0.2s ease, background-color 0.2s ease;
        }

        .public-button-secondary:hover {
            transform: translateY(-1px);
            border-color: rgba(0, 83, 219, 0.35);
            background: rgba(240, 243, 255, 0.95);
        }

        .public-link {
            color: #004ac6;
            font-weight: 600;
        }

        .public-link:hover {
            color: #003ea8;
        }

        .public-prose {
            color: #434655;
            line-height: 1.75;
        }

        .public-prose h2,
        .public-prose h3 {
            color: #151c27;
            font-weight: 800;
            margin-top: 2rem;
            margin-bottom: 0.75rem;
        }

        .public-prose h2:first-child,
        .public-prose h3:first-child {
            margin-top: 0;
        }

        .public-prose ul {
            list-style: disc;
            padding-left: 1.4rem;
        }

        .public-prose a {
            color: #004ac6;
            text-decoration: underline;
            text-decoration-color: rgba(0, 74, 198, 0.35);
        }

        .public-hero-grid {
            position: relative;
        }

        .public-hero-grid::before {
            content: "";
            position: absolute;
            inset: 0;
            background-image:
                linear-gradient(rgba(195, 198, 215, 0.18) 1px, transparent 1px),
                linear-gradient(90deg, rgba(195, 198, 215, 0.18) 1px, transparent 1px);
            background-size: 36px 36px;
            mask-image: radial-gradient(circle at center, black 34%, transparent 80%);
            pointer-events: none;
        }

        .progress-step-current,
        .progress-step-complete,
        .progress-step-upcoming {
            width: 2rem;
            height: 2rem;
            border-radius: 9999px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 0.875rem;
            font-weight: 700;
        }

        .progress-step-current {
            background: #004ac6;
            color: #ffffff;
            box-shadow: 0 12px 28px rgba(0, 74, 198, 0.22);
        }

        .progress-step-complete {
            background: #006c4a;
            color: #ffffff;
        }

        .progress-step-upcoming {
            background: #dce2f3;
            color: #434655;
        }

        .progress-line {
            width: 2.5rem;
            height: 1px;
            background: rgba(115, 118, 134, 0.4);
        }
    </style>
    {% block extra_head %}{% endblock %}
</head>
<body class="min-h-screen text-on-surface selection:bg-primary-fixed selection:text-on-primary-fixed">
    {% include 'includes/public_nav.html' %}
    <main class="{% block main_classes %}pt-24 pb-20{% endblock %}">
        {% include 'includes/public_messages.html' %}
        {% block content %}{% endblock %}
    </main>
    {% include 'includes/public_footer.html' %}
</body>
</html>
