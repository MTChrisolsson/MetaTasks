{% extends "staff_panel/base.html" %}

{% block staff_panel_content %}
<div class="mb-8">
    <div class="flex items-center justify-between">
        <div>
            <div class="flex items-center space-x-3">
                <a href="{% url 'staff_panel:user_detail' user_profile.id %}" class="text-purple-600 hover:text-purple-900">
                    <i class="fas fa-arrow-left"></i>
                </a>
                <div>
                    <h1 class="text-2xl font-bold text-gray-900">Edit User</h1>
                    <p class="mt-1 text-sm text-gray-600">{{ user.get_full_name }}</p>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Edit Form -->
<div class="max-w-4xl">
    <form method="post" class="space-y-6">
        {% csrf_token %}
        
        <!-- Basic Information Section -->
        <div class="bg-white rounded-lg border border-gray-200 p-6 shadow-sm">
            <h2 class="text-lg font-semibold text-gray-900 mb-6">Basic Information</h2>
            
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">First Name</label>
                    <input 
                        type="text" 
                        name="first_name" 
                        value="{{ user.first_name }}"
                        class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-purple-500 focus:border-purple-500"
                    >
                </div>
                
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Last Name</label>
                    <input 
                        type="text" 
                        name="last_name" 
                        value="{{ user.last_name }}"
                        class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-purple-500 focus:border-purple-500"
                    >
                </div>
                
                <div class="md:col-span-2">
                    <label class="block text-sm font-medium text-gray-700 mb-2">Email</label>
                    <input 
                        type="email" 
                        name="email" 
                        value="{{ user.email }}"
                        class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-purple-500 focus:border-purple-500"
                    >
                </div>
            </div>
        </div>
        
        <!-- Professional Information Section -->
        <div class="bg-white rounded-lg border border-gray-200 p-6 shadow-sm">
            <h2 class="text-lg font-semibold text-gray-900 mb-6">Professional Information</h2>
            
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Job Title</label>
                    <input 
                        type="text" 
                        name="title" 
                        value="{{ user_profile.title }}"
                        placeholder="e.g., Manager, Developer"
                        class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-purple-500 focus:border-purple-500"
                    >
                </div>
                
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Department</label>
                    <input 
                        type="text" 
                        name="department" 
                        value="{{ user_profile.department }}"
                        placeholder="e.g., Engineering, Sales"
                        class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-purple-500 focus:border-purple-500"
                    >
                </div>
                
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Location</label>
                    <select name="location" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-purple-500 focus:border-purple-500 bg-white">
                        <option value="">Select or enter location...</option>
                        {% for location in locations %}
                        <option value="{{ location }}" {% if user_profile.location == location %}selected{% endif %}>{{ location }}</option>
                        {% endfor %}
                    </select>
                </div>
                
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Phone</label>
                    <input 
                        type="tel" 
                        name="phone" 
                        value="{{ user_profile.phone }}"
                        placeholder="Office phone"
                        class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-purple-500 focus:border-purple-500"
                    >
                </div>
                
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Mobile</label>
                    <input 
                        type="tel" 
                        name="mobile" 
                        value="{{ user_profile.mobile }}"
                        placeholder="Mobile phone"
                        class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-purple-500 focus:border-purple-500"
                    >
                </div>
            </div>
        </div>
        
        <!-- Bio Section -->
        <div class="bg-white rounded-lg border border-gray-200 p-6 shadow-sm">
            <h2 class="text-lg font-semibold text-gray-900 mb-6">Bio</h2>
            
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">About User</label>
                <textarea 
                    name="bio" 
                    rows="4"
                    placeholder="Enter user bio or description..."
                    class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-purple-500 focus:border-purple-500"
                >{{ user_profile.bio }}</textarea>
                <p class="text-xs text-gray-500 mt-1">Optional: Additional information about the user</p>
            </div>
        </div>
        
        <!-- Account Status Section -->
        <div class="bg-white rounded-lg border border-gray-200 p-6 shadow-sm">
            <h2 class="text-lg font-semibold text-gray-900 mb-6">Account Status</h2>
            
            <div class="flex items-center space-x-4">
                <div class="flex items-center space-x-2">
                    <input 
                        type="radio" 
                        id="status_active" 
                        name="status" 
                        value="active"
                        {% if user.is_active %}checked{% endif %}
                        class="w-4 h-4 text-purple-600"
                    >
                    <label for="status_active" class="text-gray-700">
                        <span class="font-medium">Active</span>
                        <span class="text-gray-500 text-sm">User can log in</span>
                    </label>
                </div>
                
                <div class="flex items-center space-x-2">
                    <input 
                        type="radio" 
                        id="status_inactive" 
                        name="status" 
                        value="inactive"
                        {% if not user.is_active %}checked{% endif %}
                        class="w-4 h-4 text-purple-600"
                    >
                    <label for="status_inactive" class="text-gray-700">
                        <span class="font-medium">Inactive</span>
                        <span class="text-gray-500 text-sm">User cannot log in</span>
                    </label>
                </div>
            </div>
        </div>
        
        <!-- Form Actions -->
        <div class="flex items-center justify-between space-x-4">
            <a href="{% url 'staff_panel:user_detail' user_profile.id %}" class="inline-flex items-center px-6 py-2 bg-gray-200 text-gray-700 rounded-lg hover:bg-gray-300 transition-colors">
                <i class="fas fa-times mr-2"></i>
                Cancel
            </a>
            <button type="submit" class="inline-flex items-center px-6 py-2 bg-purple-600 text-white rounded-lg hover:bg-purple-700 transition-colors">
                <i class="fas fa-save mr-2"></i>
                Save Changes
            </button>
        </div>
    </form>
</div>
{% endblock %}
