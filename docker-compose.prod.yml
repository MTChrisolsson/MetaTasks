services:
  # PostgreSQL Database
  db:
    image: postgres:15-alpine
    container_name: metatasks_db
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - metatasks_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache & Message Broker
  redis:
    image: redis:7-alpine
    container_name: metatasks_redis
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - metatasks_network
    restart: unless-stopped

  # Django Web Application
  web:
    build: .
    container_name: metatasks_web
    env_file: .env
    volumes:
      - ./:/app
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - metatasks_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/admin/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Celery Worker (Background Tasks)
  celery:
    build: .
    container_name: metatasks_celery
    command: celery -A mediap worker -l info
    env_file: .env
    environment:
      - DB_ENGINE=django.db.backends.postgresql
    volumes:
      - ./:/app
    depends_on:
      - redis
      - db
    networks:
      - metatasks_network
    restart: unless-stopped

  # Nginx Reverse Proxy & Web Server
  nginx:
    image: nginx:alpine
    container_name: metatasks_nginx
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - static_volume:/app/staticfiles:ro
      - media_volume:/app/media:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - web
    networks:
      - metatasks_network
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  static_volume:
  media_volume:

networks:
  metatasks_network:
    driver: bridge