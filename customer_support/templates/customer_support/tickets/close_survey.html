{% extends 'customer_support/base.html' %}

{% block title %}Close {{ ticket.ticket_id }}{% endblock %}

{% block customer_support_content %}
<div class="max-w-xl rounded-xl border border-slate-200 bg-white p-6">
    <h2 class="text-xl font-bold text-slate-900 mb-4">Close Ticket {{ ticket.ticket_id }}</h2>
    <form method="post" class="space-y-4">
        {% csrf_token %}
        <label class="block text-sm font-medium text-slate-700">Satisfaction score (1-5)</label>
        <input type="number" min="1" max="5" name="customer_satisfaction_score" class="w-full rounded-lg border-slate-300" />
        <button type="submit" class="rounded-lg bg-emerald-600 text-white px-4 py-2 text-sm font-semibold">Close Ticket</button>
    </form>
</div>
{% endblock %}
