{% extends 'customer_support/base.html' %}

{% block title %}Ticket Trends{% endblock %}

{% block customer_support_content %}
<div class="rounded-xl border border-slate-200 bg-white p-6">
    <h2 class="text-xl font-bold text-slate-900 mb-4">Ticket Volume (Last 30 Entries)</h2>
    <table class="min-w-full divide-y divide-slate-200 text-sm">
        <thead class="bg-slate-50">
            <tr>
                <th class="px-4 py-2 text-left">Day</th>
                <th class="px-4 py-2 text-left">Tickets</th>
            </tr>
        </thead>
        <tbody class="divide-y divide-slate-100">
            {% for row in trend_rows %}
            <tr>
                <td class="px-4 py-2">{{ row.day }}</td>
                <td class="px-4 py-2">{{ row.total }}</td>
            </tr>
            {% empty %}
            <tr><td class="px-4 py-4 text-slate-500" colspan="2">No trend data available.</td></tr>
            {% endfor %}
        </tbody>
    </table>
</div>
{% endblock %}
