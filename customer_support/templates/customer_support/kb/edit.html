{% extends 'customer_support/base.html' %}
{% block title %}Edit: {{ article.title }}{% endblock %}
{% block customer_support_content %}
<div class="max-w-2xl mx-auto space-y-6">
    <div class="flex items-center gap-4">
        <a href="{% url 'customer_support:kb_article_detail' article.slug %}" class="text-sm text-cyan-700 hover:underline">← Back to Article</a>
        <h2 class="text-xl font-bold text-slate-900">Edit Article</h2>
    </div>
    <div class="rounded-xl border border-slate-200 bg-white p-6">
        <form method="post" class="space-y-4">
            {% csrf_token %}
            {{ form.as_p }}
            <div class="flex gap-3 pt-2">
                <button type="submit" class="rounded-lg bg-cyan-600 text-white px-5 py-2 text-sm font-semibold">Save Changes</button>
                <a href="{% url 'customer_support:kb_article_detail' article.slug %}" class="rounded-lg border border-slate-300 px-5 py-2 text-sm font-medium">Cancel</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
